services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api

  api:
    build:
      context: ./backend
      dockerfile: CondoLink.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 8080
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=condolink;Username=postgres;Password=postgres
      Jwt__Issuer: CondoLink
      Jwt__Audience: CondoLink
      Jwt__Key: development-only-secret-key-change-in-production
      Jwt__ExpirationMinutes: 60
      FileStorage__RootPath: /app/storage
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - condolink_file_storage:/app/storage

  db:
    image: postgres:17
    environment:
      POSTGRES_DB: condolink
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - condolink_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d condolink"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  condolink_db_data:
  condolink_file_storage:
